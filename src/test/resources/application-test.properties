# Datasource is injected dynamically by Testcontainers via @DynamicPropertySource
# Do NOT hardcode a datasource URL here

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true

logging.level.root=WARN
logging.level.com.satya.urlshortener=DEBUG

spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener_test
spring.datasource.username=postgres
spring.datasource.password=root
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.flyway.enabled=true
spring.docker.compose.enabled=false